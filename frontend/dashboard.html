<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hotel Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1000; 
        } 
        .back-btn {
            display: inline-block;
            background-color: #34495e;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin: 20px 0 0 20px;
            transition: background 0.3s;
            font-family: sans-serif;
        }
        .back-btn:hover {
            background-color: #2c3e50;
        }

        .modal-content { 
            background: white; 
            margin: 10% auto; 
            padding: 30px; 
            width: 350px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        .modal-content input { 
            width: 90%; 
            margin-bottom: 15px; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        }

        button { 
            padding: 10px 15px; 
            border: none; 
            border-radius: 5px; 
            color: white; 
            cursor: pointer; 
            background: #0d6efd; 
            margin-top: 5px; 
        }

        button:disabled { 
            background: #95a5a6; 
            cursor: not-allowed; 
        }

        .qr-box{
            background:#f8f9fa;
            padding:15px;
            border-radius:10px;
            display:inline-block;
        }
    </style>
</head>

<body>

<body>
    <a href="index.html" class="back-btn">← Back to Portal</a>
    
<h1>Hotel Rooms Overview</h1>
<div class="container" id="rooms"></div>

<div id="bookingModal" class="modal">

    <!-- Step 1 Guest Details -->
    <div class="modal-content" id="step1-form">
        <h2>Guest Details</h2>

        <input id="guestName" type="text" placeholder="Enter Guest Name" required>
        <input id="guestPhone" type="text" placeholder="Enter Phone Number" required>

        <button onclick="goToPayment()">Proceed to Payment</button>
        <button style="background:#e74c3c;" onclick="closeModal()">Cancel</button>
    </div>

    <!-- Step 2 Payment -->
    <div class="modal-content" id="step2-payment" style="display:none;">
        <h2>Scan to Pay</h2>

        <p style="font-size:1.2em;font-weight:bold;">
            Total: ₹<span id="payAmount">0</span>
        </p>

        <div class="qr-box">

            <!-- YOUR UPI QR -->
            <img 
            src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=vinitchaudhariv2-1@okhdfcbank&pn=Vinit%20Chaudhari&cu=INR"
            alt="QR Code"
            style="border-radius:8px;">

        </div>

        <p style="color:#7f8c8d;font-size:0.9em;margin-top:10px;">
            Scan with any UPI App (GPay / PhonePe / Paytm)
        </p>

        <button id="payBtn" style="background:#2ecc71;width:100%;" onclick="confirmBooking()">
            I Have Paid
        </button>
    </div>

    <!-- Step 3 Receipt -->
    <div class="modal-content" id="step3-receipt" style="display:none;">
        <h2 style="color:#2ecc71;">Confirmed! ✅</h2>

        <div id="receiptData" 
        style="text-align:left;background:#f8f9fa;padding:15px;border-radius:8px;margin-bottom:20px;border:1px dashed #ccc;">
        </div>

        <button onclick="closeAndReload()" style="width:100%;">
            Done
        </button>
    </div>

</div>

<script src="js/room.js?v=2"></script>

</body>
</html>
