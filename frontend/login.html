<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access - Grand Hotel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: linear-gradient(rgba(7, 11, 25, 0.7), rgba(7, 11, 25, 0.9)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            padding: 50px 40px;
        }
        .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: var(--text-muted); font-weight: 600; transition: all 0.3s; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); text-shadow: 0 0 10px rgba(0,242,254,0.4);}
        .tab:hover { color: #fff; }
        .back-to-portal-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            z-index: 1000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-to-portal-btn:hover {
            background: var(--primary-gradient);
            border-color: transparent;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-to-portal-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Portal
    </a>

    <div class="glass-panel login-card animate-up">
        <div class="text-center mb-4" style="margin-bottom: 30px;">
            <a href="index.html" style="text-decoration: none;">
                <h2 class="text-primary" style="font-size: 2.2em; font-weight: 800; letter-spacing: 2px;">SECURE ACCESS</h2>
            </a>
            <p class="text-muted" style="margin-top: 10px; font-size: 0.9em;">Access your personalized Grand Hotel experience.</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" id="tab-guest" onclick="switchLogin('guest')">Guest</div>
            <div class="tab" id="tab-staff" onclick="switchLogin('admin')">Admin/Staff</div>
        </div>

        <form id="loginForm">
            <input type="hidden" id="roleType" value="guest">
            
            <div class="form-group">
                <label id="userLabel"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username (guest1, admin, staff1)" required autocomplete="off">
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password (pass or admin)" required autocomplete="new-password">
            </div>
            
            <button type="button" onclick="login()" class="btn btn-primary w-100" style="width: 100%; padding: 16px;">
                Authenticate <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            <p class="error-msg text-center mt-3 text-red" id="error-msg" style="display:none; color: #e74c3c; margin-top: 15px;"></p>
        </form>
    </div>

    <script>
        function switchLogin(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + (type === 'guest' ? 'guest' : 'staff')).classList.add('active');
            document.getElementById('roleType').value = type;
        }

        function login() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;

            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => {
                if(!res.ok) throw new Error("Invalid Credentials");
                return res.json();
            })
            .then(data => {
                let selectedRole = document.getElementById('roleType').value;
                if(selectedRole !== 'guest' && data.role === 'guest') {
                    throw new Error("Unauthorized for Admin Portal.");
                }
                
                localStorage.setItem("userRole", data.role);
                localStorage.setItem("username", data.username);
                
                if (data.role === 'admin') {
                    window.location.href = "admin_portal.html";
                } else if (data.role === 'staff') {
                    window.location.href = "staff_portal.html"; // Dedicated operations portal
                } else {
                    window.location.href = "guest_portal.html";
                }
            })
            .catch(e => {
                let err = document.getElementById('error-msg');
                err.style.display = 'block';
                err.innerText = e.message;
            });
        }
    </script>
</body>
</html>
