<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Housekeeping Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .back-btn { display: inline-block; background-color: #34495e; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background-color: #2c3e50; }
        
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        
        .submit-btn { width: 100%; background-color: #27ae60; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background-color: #219150; }
        
        #messageBox { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Portal</a>

    <div class="container">
        <h1>🧹 Housekeeping Log</h1>
        
        <div class="form-group">
            <label>Staff Member Name</label>
            <input type="text" id="staffName" placeholder="e.g. John Doe">
        </div>
        
        <div class="form-group">
            <label>Room Number Cleaned</label>
            <input type="number" id="roomNumber" placeholder="e.g. 101">
        </div>

        <button class="submit-btn" onclick="submitCleaningLog()">Mark Room as Cleaned</button>

        <div id="messageBox"></div>
    </div>

    <script>
        async function submitCleaningLog() {
            const staffName = document.getElementById('staffName').value.trim();
            const roomNumber = document.getElementById('roomNumber').value.trim();
            const messageBox = document.getElementById('messageBox');

            if (!staffName || !roomNumber) {
                showMessage("Please fill out both fields!", "error");
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/api/log_cleaning', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staff_name: staffName, room_number: roomNumber })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage(result.message, "success");
                    document.getElementById('roomNumber').value = ''; // Clear the room number for the next entry
                } else {
                    showMessage(result.error, "error");
                }
            } catch (error) {
                showMessage("Server error. Is your Python backend running?", "error");
            }
        }

        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = type;
            messageBox.style.display = 'block';
            setTimeout(() => { messageBox.style.display = 'none'; }, 4000); // Hide after 4 seconds
        }
    </script>
</body>
</html>
